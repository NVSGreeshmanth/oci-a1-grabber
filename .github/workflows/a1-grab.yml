name: A1 capacity grabber

# Retries an Always-Free Ampere A1 launch every 5 min until Sydney has capacity,
# then no-ops once TripPlanner-A1 is running. Put this in a DEDICATED PUBLIC repo
# so Actions minutes are unlimited (private repos share a 2000/mo pool with the
# GTFS-DB build). Secrets stay encrypted in repo settings — safe in a public repo.
# Disable the workflow (Actions tab) once A1 is landed.

on:
  schedule:
    - cron: '*/5 * * * *'      # every 5 minutes (public repo = unlimited minutes)
  workflow_dispatch: {}          # also run manually from the Actions tab

concurrency:
  group: a1-grab
  cancel-in-progress: false

jobs:
  grab:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      SSH_PUBKEY:          ${{ secrets.OCI_SSH_PUBKEY }}
      OCPUS: '1'
      MEMGB: '6'
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Try to launch A1 (skips if one already exists)
        run: |
          set -uo pipefail
          COMP=$(oci iam availability-domain list --query 'data[0]."compartment-id"' --raw-output)
          AD=$(oci iam availability-domain list --query 'data[0].name' --raw-output)

          EXIST=$(oci compute instance list -c "$COMP" --display-name TripPlanner-A1 \
            --query "data[?\"lifecycle-state\"!='TERMINATED'].id | [0]" --raw-output || true)
          if [ -n "${EXIST:-}" ] && [ "$EXIST" != "null" ]; then
            echo "A1 already exists ($EXIST) — nothing to do."; exit 0
          fi

          IMAGE=$(oci compute image list -c "$COMP" \
            --operating-system "Canonical Ubuntu" --operating-system-version "24.04" \
            --shape VM.Standard.A1.Flex --sort-by TIMECREATED --query 'data[0].id' --raw-output)
          SUBNET=$(oci network subnet list -c "$COMP" \
            --query "data[?contains(\"display-name\",'public')].id | [0]" --raw-output)
          printf '%s\n' "$SSH_PUBKEY" > /tmp/id.pub

          if oci compute instance launch \
                --availability-domain "$AD" -c "$COMP" \
                --shape VM.Standard.A1.Flex \
                --shape-config "{\"ocpus\":$OCPUS,\"memoryInGBs\":$MEMGB}" \
                --image-id "$IMAGE" --subnet-id "$SUBNET" \
                --assign-public-ip true --ssh-authorized-keys-file /tmp/id.pub \
                --display-name TripPlanner-A1 --wait-for-state RUNNING 2>/tmp/e; then
            IID=$(oci compute instance list -c "$COMP" --display-name TripPlanner-A1 \
              --lifecycle-state RUNNING --query 'data[0].id' --raw-output)
            IP=$(oci compute instance list-vnics --instance-id "$IID" \
              --query 'data[0]."public-ip"' --raw-output)
            echo "## 🎉 A1 launched" >> "$GITHUB_STEP_SUMMARY"
            echo "Public IP: \`$IP\`" >> "$GITHUB_STEP_SUMMARY"
            echo "A1 LAUNCHED ip=$IP"
          else
            if grep -qi 'capacity' /tmp/e; then
              echo "Still out of A1 capacity — will retry next run."; exit 0
            fi
            echo "Non-capacity error:"; cat /tmp/e; exit 1
          fi
